<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cat Tower Defense</title>
  <style>
    html, body { margin: 0; height: 100%; background: #121417; color: #e8eef6; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    .wrap { height: 100%; display: grid; place-items: center; }
    canvas { width: min(1120px, calc(100vw - 20px), calc((100vh - 60px) * 1.4)); aspect-ratio: 1120 / 800; image-rendering: pixelated; background: #1b1f24; border: 2px solid #2a323c; border-radius: 10px; box-shadow: 0 14px 50px rgba(0,0,0,.45); }
    .hint { width: min(1120px, calc(100vw - 20px), calc((100vh - 60px) * 1.4)); margin-top: 10px; font-size: 13px; color: #aab6c5; line-height: 1.35; text-align: left; }
    .hint kbd { font: inherit; background: #222a33; border: 1px solid #313b47; border-bottom-width: 2px; padding: 1px 6px; border-radius: 6px; color: #e8eef6; }
  </style>
</head>
<body>
  <div class="wrap"><div>
    <canvas id="game" width="1120" height="800" aria-label="Cat Tower Defense game"></canvas>
    <div class="hint">
      Click tower in bottom panel, then click grass to place. <kbd>1</kbd>-<kbd>6</kbd> select towers. <kbd>Space</kbd> send wave. <kbd>Esc</kbd> cancel. Click placed tower to upgrade/sell.
    </div>
  </div></div>
  <script>
  (() => {
    "use strict";
    // === CONSTANTS / HELPERS ===
    const W = 1120, H = 800, GS = 40, COLS = 28, ROWS = 17, UI_Y = 680, UI_H = 120;
    const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
    const rand = (a, b) => a + Math.random() * (b - a);
    const randi = (a, b) => (a + Math.floor(Math.random() * (b - a + 1)));
    const dist2 = (ax, ay, bx, by) => { const dx = ax - bx, dy = ay - by; return dx*dx + dy*dy; };
    const cellCtr = (c, r) => ({ x: c * GS + GS / 2, y: r * GS + GS / 2 });
    let uid = 0;
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    // === TOWER DEFINITIONS ===
    const TDEFS = {
      basic:  { name:"Tabby Cat",    cost:50,  range:120, dmg:10, rate:60,  proj:"yarn",     color:"#ffa43a", special:null },
      sniper: { name:"Siamese",      cost:100, range:240, dmg:40, rate:150, proj:"laser",    color:"#d4c5a9", special:null },
      rapid:  { name:"Calico",       cost:75,  range:100, dmg:5,  rate:20,  proj:"claw",     color:"#f5f5f5", special:null },
      slow:   { name:"Russian Blue", cost:100, range:120, dmg:5,  rate:60,  proj:"ice",      color:"#7ba7c9", special:"slow" },
      splash: { name:"Persian",      cost:125, range:120, dmg:15, rate:86,  proj:"hairball", color:"#d4a76a", special:"splash" },
      super:  { name:"Maine Coon",   cost:250, range:160, dmg:50, rate:120, proj:"swipe",    color:"#8b5e3c", special:"aoe" },
    };
    const TKEYS = ["basic","sniper","rapid","slow","splash","super"];
    const TUNLOCK = { basic:1, sniper:3, rapid:5, slow:8, splash:10, super:15 };
    const UPG_COST = [0.6, 1.0];
    const UPG_DMG  = [1.0, 1.5, 2.2];
    const UPG_RNG  = [1.0, 1.1, 1.2];

    // === ENEMY DEFINITIONS ===
    const EDEFS = {
      mouse:    { name:"Mouse",    hp:30,  speed:1.5, reward:5,   color:"#b0b0b0", radius:8,  special:null },
      rat:      { name:"Rat",      hp:60,  speed:2.2, reward:8,   color:"#8b6f47", radius:10, special:"fast" },
      squirrel: { name:"Squirrel", hp:100, speed:1.2, reward:12,  color:"#c97b3a", radius:12, special:"tanky" },
      bird:     { name:"Bird",     hp:40,  speed:1.8, reward:15,  color:"#5b9bd5", radius:9,  special:"flying" },
      dog:      { name:"Dog",      hp:500, speed:0.8, reward:100, color:"#d63434", radius:18, special:"boss" },
    };

    // === PATH / MAP ===
    const WAYPOINTS = [
      {c:0,r:2},{c:24,r:2},{c:24,r:6},{c:4,r:6},{c:4,r:10},{c:24,r:10},{c:24,r:14},{c:14,r:14},{c:14,r:16}
    ];
    let mapGrid = [];
    let pathCells = [];
    let decorations = [];

    function buildMap() {
      mapGrid = [];
      for (let r = 0; r < ROWS; r++) { mapGrid[r] = []; for (let c = 0; c < COLS; c++) mapGrid[r][c] = 0; }
      pathCells = [];
      for (let i = 0; i < WAYPOINTS.length - 1; i++) {
        const a = WAYPOINTS[i], b = WAYPOINTS[i+1];
        const dc = Math.sign(b.c - a.c), dr = Math.sign(b.r - a.r);
        let c = a.c, r = a.r;
        while (c !== b.c || r !== b.r) {
          mapGrid[r][c] = 1; pathCells.push({c,r});
          c += dc; r += dr;
        }
      }
      const last = WAYPOINTS[WAYPOINTS.length-1];
      mapGrid[last.r][last.c] = 1; pathCells.push({c:last.c, r:last.r});
      mapGrid[WAYPOINTS[0].r][WAYPOINTS[0].c] = 2;
      mapGrid[last.r][last.c] = 3;
      // decorations
      decorations = [];
      for (let i = 0; i < 20; i++) {
        const c = randi(0, COLS-1), r = randi(0, ROWS-1);
        if (mapGrid[r][c] !== 0) continue;
        let adjPath = false;
        for (let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++) {
          const nr=r+dr, nc=c+dc;
          if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&mapGrid[nr][nc]>=1) adjPath=true;
        }
        if (!adjPath) { decorations.push({c,r,type:randi(0,2)}); mapGrid[r][c]=4; }
      }
    }
    buildMap();

    // === GAME STATE ===
    const G = {
      state: "menu",
      waveState: "prep",
      wave: 1,
      lives: 20,
      currency: 100,
      towers: [],
      enemies: [],
      projectiles: [],
      particles: [],
      selType: null,
      selTower: null,
      hoverCell: null,
      spawnQueue: [],
      spawnTimer: 0,
      interTimer: 0,
      unlocked: ["basic"],
      totalKills: 0,
      unlockNote: null,
    };

    function resetGame() {
      G.state = "menu"; G.waveState = "prep"; G.wave = 1; G.lives = 20; G.currency = 100;
      G.towers = []; G.enemies = []; G.projectiles = []; G.particles = [];
      G.selType = null; G.selTower = null; G.hoverCell = null;
      G.spawnQueue = []; G.spawnTimer = 0; G.interTimer = 0;
      G.unlocked = ["basic"]; G.totalKills = 0; G.unlockNote = null;
      buildMap();
    }

    // === PLACEHOLDER: remaining systems injected by subsequent chunks ===
    // CHUNK2_INSERT

    // === WAVE GENERATION ===
    const WAVE_TABLE = [
      null, // index 0 unused
      [{t:"mouse",n:8}],
      [{t:"mouse",n:12}],
      [{t:"mouse",n:10},{t:"rat",n:4}],
      [{t:"mouse",n:8},{t:"rat",n:6}],
      [{t:"mouse",n:5},{t:"rat",n:5},{t:"squirrel",n:3},{t:"dog",n:1}],
      [{t:"rat",n:12},{t:"squirrel",n:4}],
      [{t:"rat",n:15},{t:"squirrel",n:6}],
      [{t:"rat",n:10},{t:"squirrel",n:8},{t:"bird",n:4}],
      [{t:"squirrel",n:10},{t:"bird",n:8}],
      [{t:"squirrel",n:8},{t:"bird",n:10},{t:"dog",n:1}],
    ];

    function generateWave(waveNum) {
      const list = [];
      if (waveNum <= 10) {
        for (const g of WAVE_TABLE[waveNum]) for (let i = 0; i < g.n; i++) list.push(g.t);
      } else {
        const count = 15 + waveNum * 2;
        const types = ["mouse","rat","squirrel","bird"];
        const weights = [0.15, 0.30, 0.30, 0.25];
        for (let i = 0; i < count; i++) {
          let r = Math.random(), acc = 0;
          for (let j = 0; j < types.length; j++) { acc += weights[j]; if (r < acc) { list.push(types[j]); break; } }
        }
        if (waveNum % 5 === 0) { const nb = Math.floor(waveNum / 5); for (let i = 0; i < nb; i++) list.push("dog"); }
      }
      // shuffle non-boss, then append bosses at end
      const bosses = list.filter(t => t === "dog");
      const rest = list.filter(t => t !== "dog");
      for (let i = rest.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [rest[i], rest[j]] = [rest[j], rest[i]]; }
      return [...rest, ...bosses];
    }

    function scaleHP(base, wave) { return Math.round(base * (1 + (wave - 1) * 0.12)); }

    function spawnEnemy(type) {
      const def = EDEFS[type];
      const start = cellCtr(WAYPOINTS[0].c, WAYPOINTS[0].r);
      const hp = type === "dog" ? scaleHP(def.hp, G.wave) * (1 + Math.floor(G.wave / 5) * 0.15) : scaleHP(def.hp, G.wave);
      G.enemies.push({
        id: uid++, type, hp: Math.round(hp), maxHp: Math.round(hp),
        speed: def.speed, baseSpeed: def.speed, reward: def.reward,
        x: start.x, y: start.y, wpIdx: 0, pathProg: 0, totalProg: 0,
        slowTimer: 0, alive: true, color: def.color, radius: def.radius, special: def.special,
      });
    }

    // === TOWER PLACEMENT & TARGETING ===
    function canPlace(c, r) {
      if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return false;
      if (mapGrid[r][c] !== 0) return false;
      for (const t of G.towers) if (t.col === c && t.row === r) return false;
      return true;
    }

    function placeTower(type, c, r) {
      const def = TDEFS[type];
      if (G.currency < def.cost) return false;
      if (!canPlace(c, r)) return false;
      G.currency -= def.cost;
      const pos = cellCtr(c, r);
      G.towers.push({ id: uid++, type, col: c, row: r, x: pos.x, y: pos.y, level: 0, cooldown: 0, target: null, kills: 0, totalSpent: def.cost });
      return true;
    }

    function upgradeTower(tower) {
      if (tower.level >= 2) return false;
      const def = TDEFS[tower.type];
      const cost = Math.round(def.cost * UPG_COST[tower.level]);
      if (G.currency < cost) return false;
      G.currency -= cost;
      tower.totalSpent += cost;
      tower.level++;
      return true;
    }

    function sellTower(tower) {
      G.currency += Math.round(tower.totalSpent * 0.6);
      G.towers = G.towers.filter(t => t.id !== tower.id);
      if (G.selTower && G.selTower.id === tower.id) G.selTower = null;
    }

    function towerRange(tower) {
      return TDEFS[tower.type].range * UPG_RNG[tower.level];
    }

    function towerDmg(tower) {
      return TDEFS[tower.type].dmg * UPG_DMG[tower.level];
    }

    function towerRate(tower) {
      return TDEFS[tower.type].rate;
    }

    // === PROJECTILE / COMBAT ===
    function fireProjectile(tower, enemy) {
      const def = TDEFS[tower.type];
      if (def.proj === "laser") {
        // instant hit
        applyDamage(enemy, towerDmg(tower), def.special, tower);
        G.particles.push({ x: enemy.x, y: enemy.y, x2: tower.x, y2: tower.y, type: "laser", life: 8, maxLife: 8 });
        return;
      }
      if (def.proj === "swipe") {
        // AoE instant
        const r = towerRange(tower);
        const dmg = towerDmg(tower);
        for (const e of G.enemies) {
          if (e.alive && dist2(tower.x, tower.y, e.x, e.y) <= r * r) applyDamage(e, dmg, null, tower);
        }
        G.particles.push({ x: tower.x, y: tower.y, type: "swipe", life: 12, maxLife: 12, range: r });
        return;
      }
      const speed = def.proj === "claw" ? 8 : 5;
      G.projectiles.push({
        id: uid++, x: tower.x, y: tower.y, targetId: enemy.id, speed,
        damage: towerDmg(tower), type: def.proj, special: def.special,
        splashRadius: def.special === "splash" ? 60 : 0,
        slowDuration: def.special === "slow" ? 120 : 0, alive: true,
      });
    }

    function applyDamage(enemy, dmg, special, tower) {
      enemy.hp -= dmg;
      spawnHitParticles(enemy.x, enemy.y, enemy.color);
      if (enemy.hp <= 0 && enemy.alive) {
        enemy.alive = false;
        G.currency += enemy.reward;
        G.totalKills++;
        if (tower) tower.kills++;
        if (enemy.special === "boss") {
          for (let i = 0; i < 2; i++) spawnEnemy("mouse");
          soundBossDeath();
        } else {
          soundEnemyDeath();
        }
        spawnDeathParticles(enemy.x, enemy.y, enemy.color);
      }
      if (special === "slow" && enemy.alive) {
        const dur = enemy.special === "flying" ? 60 : 120;
        enemy.slowTimer = Math.max(enemy.slowTimer, dur);
      }
    }

    // === UPDATE FUNCTIONS ===
    function updateSpawner(dt) {
      if (G.spawnQueue.length === 0) return;
      G.spawnTimer -= dt;
      if (G.spawnTimer <= 0) {
        const type = G.spawnQueue.shift();
        spawnEnemy(type);
        G.spawnTimer = type === "dog" ? 90 : 30;
        soundWaveSpawn();
      }
    }

    function updateEnemies(dt) {
      for (const e of G.enemies) {
        if (!e.alive) continue;
        // slow
        if (e.slowTimer > 0) { e.speed = e.baseSpeed * 0.6; e.slowTimer -= dt; }
        else { e.speed = e.baseSpeed; }
        // move along path
        if (e.wpIdx >= WAYPOINTS.length - 1) { e.alive = false; G.lives--; soundLifeLost(); if (G.lives <= 0) { G.state = "gameover"; soundGameOver(); } continue; }
        const cur = cellCtr(WAYPOINTS[e.wpIdx].c, WAYPOINTS[e.wpIdx].r);
        const nxt = cellCtr(WAYPOINTS[e.wpIdx + 1].c, WAYPOINTS[e.wpIdx + 1].r);
        const dx = nxt.x - cur.x, dy = nxt.y - cur.y;
        const segLen = Math.sqrt(dx * dx + dy * dy);
        if (segLen === 0) { e.wpIdx++; continue; }
        const move = e.speed * dt;
        e.pathProg += move / segLen;
        if (e.pathProg >= 1) { e.pathProg -= 1; e.wpIdx++; }
        if (e.wpIdx < WAYPOINTS.length - 1) {
          const c2 = cellCtr(WAYPOINTS[e.wpIdx].c, WAYPOINTS[e.wpIdx].r);
          const n2 = cellCtr(WAYPOINTS[e.wpIdx + 1].c, WAYPOINTS[e.wpIdx + 1].r);
          e.x = c2.x + (n2.x - c2.x) * e.pathProg;
          e.y = c2.y + (n2.y - c2.y) * e.pathProg;
        }
        e.totalProg = e.wpIdx + e.pathProg;
      }
      G.enemies = G.enemies.filter(e => e.alive || e.hp > 0);
    }

    function updateTowers(dt) {
      for (const t of G.towers) {
        t.cooldown -= dt;
        const r2 = towerRange(t) * towerRange(t);
        // validate target
        if (t.target) {
          const te = G.enemies.find(e => e.id === t.target);
          if (!te || !te.alive || dist2(t.x, t.y, te.x, te.y) > r2) t.target = null;
        }
        // acquire target (first = furthest along path)
        if (!t.target) {
          let best = null, bestProg = -1;
          for (const e of G.enemies) {
            if (!e.alive) continue;
            if (dist2(t.x, t.y, e.x, e.y) > r2) continue;
            if (e.totalProg > bestProg) { bestProg = e.totalProg; best = e; }
          }
          if (best) t.target = best.id;
        }
        // fire
        if (t.target && t.cooldown <= 0) {
          const te = G.enemies.find(e => e.id === t.target);
          if (te && te.alive) {
            fireProjectile(t, te);
            t.cooldown = towerRate(t);
            soundTowerShoot(t.type);
          }
        }
      }
    }

    function updateProjectiles(dt) {
      for (const p of G.projectiles) {
        if (!p.alive) continue;
        let te = G.enemies.find(e => e.id === p.targetId && e.alive);
        if (!te) { te = G.enemies.find(e => e.alive); if (!te) { p.alive = false; continue; } p.targetId = te.id; }
        const dx = te.x - p.x, dy = te.y - p.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < p.speed * dt) {
          // hit
          applyDamage(te, p.damage, p.special, null);
          if (p.special === "splash") {
            for (const e of G.enemies) {
              if (e.alive && e.id !== te.id && dist2(e.x, e.y, te.x, te.y) <= p.splashRadius * p.splashRadius) {
                applyDamage(e, Math.round(p.damage * 0.5), null, null);
              }
            }
          }
          p.alive = false;
        } else {
          p.x += (dx / d) * p.speed * dt;
          p.y += (dy / d) * p.speed * dt;
        }
      }
      G.projectiles = G.projectiles.filter(p => p.alive);
    }

    function updateParticles(dt) {
      for (const p of G.particles) {
        p.life -= dt;
        if (p.vx !== undefined) { p.x += p.vx * dt; p.y += p.vy * dt; }
      }
      G.particles = G.particles.filter(p => p.life > 0);
    }

    function spawnHitParticles(x, y, color) {
      for (let i = 0; i < 4; i++) {
        const a = Math.random() * Math.PI * 2;
        G.particles.push({ x, y, vx: Math.cos(a)*1.5, vy: Math.sin(a)*1.5, life: 15, maxLife: 15, color, size: 3, type: "dot" });
      }
    }

    function spawnDeathParticles(x, y, color) {
      for (let i = 0; i < 8; i++) {
        const a = Math.random() * Math.PI * 2;
        G.particles.push({ x, y, vx: Math.cos(a)*2.5, vy: Math.sin(a)*2.5, life: 25, maxLife: 25, color, size: 4, type: "dot" });
      }
    }

    function checkWaveComplete() {
      if (G.spawnQueue.length > 0) return;
      if (G.enemies.some(e => e.alive)) return;
      // wave done
      G.currency += 20;
      if (G.lives > 10) G.currency += (G.lives - 10) * 5;
      // check unlocks
      for (const key of TKEYS) {
        if (G.wave >= TUNLOCK[key] && !G.unlocked.includes(key)) {
          G.unlocked.push(key);
          G.unlockNote = { type: key, timer: 180 };
          soundUpgrade();
        }
      }
      if (G.wave >= 20) { G.state = "victory"; soundVictory(); return; }
      G.waveState = "intermission";
      G.interTimer = 120;
    }

    function startWave() {
      G.spawnQueue = generateWave(G.wave);
      G.spawnTimer = 10;
      G.waveState = "active";
      soundWaveStart();
    }
    // CHUNK3_INSERT

    // === DRAWING: MAP ===
    function drawMap() {
      ctx.fillStyle = "#2d5a1e";
      ctx.fillRect(0, 0, W, UI_Y);
      // grass speckles
      ctx.save(); ctx.globalAlpha = 0.3; ctx.fillStyle = "#3d7a2e";
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
        if (mapGrid[r][c] !== 0 && mapGrid[r][c] !== 4) continue;
        for (let i = 0; i < 3; i++) ctx.fillRect(c*GS+rand(2,GS-4), r*GS+rand(2,GS-4), 2, 2);
      }
      ctx.restore();
      // path
      ctx.fillStyle = "#c4a86b";
      for (const p of pathCells) ctx.fillRect(p.c*GS, p.r*GS, GS, GS);
      // path edges
      ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = "#a8905a";
      for (const p of pathCells) {
        ctx.fillRect(p.c*GS, p.r*GS, GS, 2);
        ctx.fillRect(p.c*GS, p.r*GS+GS-2, GS, 2);
        ctx.fillRect(p.c*GS, p.r*GS, 2, GS);
        ctx.fillRect(p.c*GS+GS-2, p.r*GS, 2, GS);
      }
      ctx.restore();
      // entry
      const ep = cellCtr(WAYPOINTS[0].c, WAYPOINTS[0].r);
      ctx.save(); ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now()/300);
      ctx.fillStyle = "#44ff44";
      ctx.beginPath(); ctx.moveTo(ep.x-12,ep.y-10); ctx.lineTo(ep.x+8,ep.y); ctx.lineTo(ep.x-12,ep.y+10); ctx.closePath(); ctx.fill();
      ctx.restore();
      // exit
      const xp = cellCtr(WAYPOINTS[WAYPOINTS.length-1].c, WAYPOINTS[WAYPOINTS.length-1].r);
      ctx.save(); ctx.globalAlpha = 0.6;
      ctx.fillStyle = "#ff3333";
      ctx.fillRect(xp.x-GS/2, xp.y-GS/2, GS, GS);
      ctx.globalAlpha = 1; ctx.fillStyle = "#fff"; ctx.font = "bold 20px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.fillText("X", xp.x, xp.y);
      ctx.restore();
      // decorations
      for (const d of decorations) {
        const cx = d.c*GS+GS/2, cy = d.r*GS+GS/2;
        ctx.save(); ctx.globalAlpha = 0.5;
        if (d.type === 0) { // yarn ball
          ctx.fillStyle = "#e84393"; ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle = "#c44080"; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.arc(cx,cy,5,0.3,2.5); ctx.stroke();
        } else if (d.type === 1) { // fish bone
          ctx.strokeStyle = "#dfe6e9"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(cx-10,cy); ctx.lineTo(cx+10,cy); ctx.stroke();
          for (let i = -6; i <= 6; i += 4) { ctx.beginPath(); ctx.moveTo(cx+i,cy); ctx.lineTo(cx+i+(i<0?-3:3),cy-5); ctx.stroke(); ctx.beginPath(); ctx.moveTo(cx+i,cy); ctx.lineTo(cx+i+(i<0?-3:3),cy+5); ctx.stroke(); }
        } else { // paw print
          ctx.fillStyle = "#8e6e53";
          ctx.beginPath(); ctx.ellipse(cx,cy+3,6,5,0,0,Math.PI*2); ctx.fill();
          const pads = [[-5,-4],[-1,-7],[4,-6],[7,-2]];
          for (const [px,py] of pads) { ctx.beginPath(); ctx.arc(cx+px,cy+py,2.5,0,Math.PI*2); ctx.fill(); }
        }
        ctx.restore();
      }
      // grid overlay
      ctx.save(); ctx.globalAlpha = 0.08; ctx.strokeStyle = "#000";
      for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*GS,0); ctx.lineTo(c*GS,UI_Y); ctx.stroke(); }
      for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0,r*GS); ctx.lineTo(W,r*GS); ctx.stroke(); }
      ctx.restore();
    }

    // === DRAWING: TOWERS ===
    function drawCatTower(x, y, color, level, scale) {
      const s = scale || 1;
      ctx.save(); ctx.translate(x, y); ctx.scale(s, s);
      // body
      ctx.fillStyle = color; ctx.beginPath(); ctx.arc(0, 2, 14, 0, Math.PI*2); ctx.fill();
      // ears
      const darker = shadeColor(color, -30);
      ctx.fillStyle = darker;
      ctx.beginPath(); ctx.moveTo(-9,-6); ctx.lineTo(-3,-18); ctx.lineTo(3,-6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(9,-6); ctx.lineTo(3,-18); ctx.lineTo(-3,-6); ctx.closePath(); ctx.fill();
      // eyes
      ctx.fillStyle = "#1b1b1b";
      ctx.beginPath(); ctx.arc(-5, 0, 2.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(5, 0, 2.2, 0, Math.PI*2); ctx.fill();
      // nose
      ctx.fillStyle = "#e87e7e";
      ctx.beginPath(); ctx.arc(0, 4, 1.8, 0, Math.PI*2); ctx.fill();
      // level stars
      ctx.fillStyle = "#ffd700";
      ctx.font = "bold 10px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "bottom";
      if (level >= 1) ctx.fillText("\u2605", -5, -18);
      if (level >= 2) ctx.fillText("\u2605", 5, -18);
      ctx.restore();
    }

    function shadeColor(hex, amt) {
      let r = parseInt(hex.slice(1,3),16)+amt, g = parseInt(hex.slice(3,5),16)+amt, b = parseInt(hex.slice(5,7),16)+amt;
      r = clamp(r,0,255); g = clamp(g,0,255); b = clamp(b,0,255);
      return "#" + (r<<16|g<<8|b).toString(16).padStart(6,"0");
    }

    function drawTowers() {
      for (const t of G.towers) {
        drawCatTower(t.x, t.y, TDEFS[t.type].color, t.level, 0.85);
      }
      // range circle for selected tower
      if (G.selTower) {
        const t = G.selTower;
        const r = towerRange(t);
        ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = "#4ea3ff";
        ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 0.4; ctx.strokeStyle = "#4ea3ff"; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.arc(t.x, t.y, r, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }
    }

    // === DRAWING: ENEMIES ===
    function drawEnemies() {
      for (const e of G.enemies) {
        if (!e.alive) continue;
        ctx.save(); ctx.translate(e.x, e.y);
        const s = e.radius / 10;
        ctx.scale(s, s);
        ctx.fillStyle = e.color;
        if (e.type === "mouse") {
          ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = shadeColor(e.color, 30);
          ctx.beginPath(); ctx.arc(-6,-7,4,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(6,-7,4,0,Math.PI*2); ctx.fill();
          ctx.strokeStyle = e.color; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(-8,5); ctx.quadraticCurveTo(-18,10,-15,18); ctx.stroke();
        } else if (e.type === "rat") {
          ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = shadeColor(e.color,-20);
          ctx.beginPath(); ctx.moveTo(-7,-6); ctx.lineTo(-3,-14); ctx.lineTo(1,-6); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(7,-6); ctx.lineTo(3,-14); ctx.lineTo(-1,-6); ctx.closePath(); ctx.fill();
          ctx.strokeStyle = e.color; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(-8,5); ctx.quadraticCurveTo(-20,8,-16,18); ctx.stroke();
        } else if (e.type === "squirrel") {
          ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = shadeColor(e.color, 20);
          ctx.beginPath(); ctx.arc(-5,-8,3,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(5,-8,3,0,Math.PI*2); ctx.fill();
          // bushy tail
          ctx.fillStyle = shadeColor(e.color, -10);
          ctx.beginPath(); ctx.arc(-10,0,7,0.5,2.5); ctx.lineTo(-10,0); ctx.closePath(); ctx.fill();
        } else if (e.type === "bird") {
          ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
          // beak
          ctx.fillStyle = "#f39c12";
          ctx.beginPath(); ctx.moveTo(10,0); ctx.lineTo(16,-3); ctx.lineTo(16,3); ctx.closePath(); ctx.fill();
          // wings
          const wf = Math.sin(Date.now()/80) * 4;
          ctx.strokeStyle = shadeColor(e.color,-20); ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(-3,-4); ctx.quadraticCurveTo(-10,-12+wf,-6,-4); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(3,-4); ctx.quadraticCurveTo(10,-12+wf,6,-4); ctx.stroke();
        } else if (e.type === "dog") {
          ctx.beginPath(); ctx.arc(0,0,14,0,Math.PI*2); ctx.fill();
          ctx.fillStyle = shadeColor(e.color,-25);
          ctx.beginPath(); ctx.moveTo(-8,-8); ctx.lineTo(-3,-18); ctx.lineTo(2,-8); ctx.closePath(); ctx.fill();
          ctx.beginPath(); ctx.moveTo(8,-8); ctx.lineTo(3,-18); ctx.lineTo(-2,-8); ctx.closePath(); ctx.fill();
          ctx.fillStyle = "#1b1b1b";
          ctx.beginPath(); ctx.arc(-5,-2,2.5,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(5,-2,2.5,0,Math.PI*2); ctx.fill();
        }
        // eyes for non-dog non-bird
        if (e.type !== "dog" && e.type !== "bird") {
          ctx.fillStyle = "#1b1b1b";
          ctx.beginPath(); ctx.arc(-3,-1,1.8,0,Math.PI*2); ctx.fill();
          ctx.beginPath(); ctx.arc(3,-1,1.8,0,Math.PI*2); ctx.fill();
        }
        ctx.restore();
        // slow tint
        if (e.slowTimer > 0) {
          ctx.save(); ctx.globalAlpha = 0.3; ctx.fillStyle = "#7ba7c9";
          ctx.beginPath(); ctx.arc(e.x, e.y, e.radius+2, 0, Math.PI*2); ctx.fill(); ctx.restore();
        }
        // HP bar
        if (e.hp < e.maxHp) {
          const bw = e.radius * 2.2, bh = 3;
          const bx = e.x - bw/2, by = e.y - e.radius - 8;
          const pct = e.hp / e.maxHp;
          ctx.fillStyle = "#222"; ctx.fillRect(bx, by, bw, bh);
          ctx.fillStyle = pct > 0.5 ? "#44cc44" : pct > 0.25 ? "#cccc44" : "#cc4444";
          ctx.fillRect(bx, by, bw * pct, bh);
        }
      }
    }

    // === DRAWING: PROJECTILES & PARTICLES ===
    function drawProjectiles() {
      for (const p of G.projectiles) {
        if (!p.alive) continue;
        ctx.save();
        if (p.type === "yarn") {
          ctx.fillStyle = "#ffa43a"; ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
        } else if (p.type === "claw") {
          ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
          for (let i = -1; i <= 1; i++) { ctx.beginPath(); ctx.moveTo(p.x+i*3-2,p.y-3); ctx.lineTo(p.x+i*3+2,p.y+3); ctx.stroke(); }
        } else if (p.type === "hairball") {
          ctx.fillStyle = "#8b6f47"; ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#6b5030";
          for (let i = 0; i < 3; i++) ctx.fillRect(p.x+rand(-4,4), p.y+rand(-4,4), 2, 2);
        } else if (p.type === "ice") {
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(Date.now()/200);
          ctx.fillStyle = "#a8d8ea"; ctx.fillRect(-4,-4,8,8);
          ctx.restore();
        }
        ctx.restore();
      }
      // special effect particles (laser, swipe)
      for (const p of G.particles) {
        ctx.save();
        if (p.type === "laser") {
          ctx.globalAlpha = p.life / p.maxLife;
          ctx.strokeStyle = "#ff3333"; ctx.lineWidth = 2;
          ctx.beginPath(); ctx.moveTo(p.x2, p.y2); ctx.lineTo(p.x, p.y); ctx.stroke();
        } else if (p.type === "swipe") {
          ctx.globalAlpha = (p.life / p.maxLife) * 0.4;
          ctx.strokeStyle = "#8b5e3c"; ctx.lineWidth = 4;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.range * (1 - p.life/p.maxLife), 0, Math.PI*2); ctx.stroke();
        }
        ctx.restore();
      }
    }

    function drawParticles() {
      for (const p of G.particles) {
        if (p.type === "laser" || p.type === "swipe") continue;
        ctx.save();
        ctx.globalAlpha = clamp(p.life / p.maxLife, 0, 1);
        ctx.fillStyle = p.color;
        const s = p.size * (p.life / p.maxLife);
        ctx.beginPath(); ctx.arc(p.x, p.y, Math.max(0.5, s), 0, Math.PI*2); ctx.fill();
        ctx.restore();
      }
    }

    // === DRAWING: PLACEMENT PREVIEW ===
    function drawPlacementPreview() {
      if (!G.hoverCell || !G.selType) return;
      const {col, row} = G.hoverCell;
      const valid = canPlace(col, row);
      const cx = col*GS+GS/2, cy = row*GS+GS/2;
      // tint
      ctx.save(); ctx.globalAlpha = 0.3;
      ctx.fillStyle = valid ? "#44ff44" : "#ff4444";
      ctx.fillRect(col*GS, row*GS, GS, GS);
      ctx.restore();
      // preview tower
      if (valid) {
        ctx.save(); ctx.globalAlpha = 0.6;
        drawCatTower(cx, cy, TDEFS[G.selType].color, 0, 0.85);

        // range circle
        const r = TDEFS[G.selType].range;
        ctx.save(); ctx.globalAlpha = 0.12; ctx.fillStyle = "#4ea3ff";
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
        ctx.globalAlpha = 0.35; ctx.strokeStyle = "#4ea3ff"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
        ctx.restore();
      }

    // === SOUND (Web Audio API) ===
    let audioCtx = null;
    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      return audioCtx;
    }
    function playTone(freq, type, duration, gainVal, startDelay) {
      startDelay = startDelay || 0;
      try {
        const ac = getAudioCtx();
        const osc = ac.createOscillator(), gain = ac.createGain();
        osc.connect(gain); gain.connect(ac.destination);
        osc.type = type; osc.frequency.setValueAtTime(freq, ac.currentTime + startDelay);
        gain.gain.setValueAtTime(gainVal, ac.currentTime + startDelay);
        gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + startDelay + duration);
        osc.start(ac.currentTime + startDelay); osc.stop(ac.currentTime + startDelay + duration + 0.01);
      } catch(e) {}
    }
    let lastShotTime = 0;
    function soundTowerShoot() {
      const now = performance.now(); if (now - lastShotTime < 80) return; lastShotTime = now;
      playTone(600, "square", 0.04, 0.12);
    }
    function soundEnemyDeath() { playTone(440, "square", 0.06, 0.18); playTone(520, "square", 0.06, 0.12, 0.04); }
    function soundBossDeath() { playTone(200, "sawtooth", 0.3, 0.25); playTone(300, "sine", 0.35, 0.25, 0.2); }
    function soundLifeLost() { playTone(350, "square", 0.15, 0.25); playTone(280, "square", 0.2, 0.25, 0.12); }
    function soundWaveStart() { playTone(330, "sine", 0.1, 0.2); playTone(440, "sine", 0.1, 0.2, 0.1); playTone(550, "sine", 0.15, 0.2, 0.2); }
    function soundWaveSpawn() {}
    function soundUpgrade() { playTone(600, "sine", 0.08, 0.18); playTone(800, "sine", 0.08, 0.18, 0.08); playTone(1000, "sine", 0.15, 0.18, 0.16); }
    function soundVictory() { playTone(523, "sine", 0.1, 0.3); playTone(659, "sine", 0.1, 0.3, 0.11); playTone(784, "sine", 0.1, 0.3, 0.22); playTone(1047, "sine", 0.45, 0.3, 0.33); }
    function soundGameOver() { playTone(392, "sine", 0.22, 0.25); playTone(349, "sine", 0.22, 0.25, 0.22); playTone(262, "sine", 0.45, 0.25, 0.44); }
    function soundPlace() { playTone(330, "sine", 0.08, 0.2); playTone(440, "sine", 0.08, 0.2, 0.06); }

    // === HUD (top bar) ===
    function drawHUD() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(0, 0, W, 32);
      ctx.fillStyle = "#e8eef6"; ctx.font = "bold 14px system-ui"; ctx.textBaseline = "middle";
      ctx.textAlign = "left";
      // wave
      ctx.fillText("Wave: " + G.wave + "/20", 14, 16);

      ctx.fillStyle = G.lives <= 5 ? "#ff5555" : "#e8eef6";
      ctx.fillText("\u2665 " + G.lives, 160, 16);

    // === UI PANEL (bottom) ===
    function drawUIPanel() {
      // background
      ctx.fillStyle = "#1a1e24";
      ctx.fillRect(0, UI_Y, W, UI_H);
      ctx.strokeStyle = "#2a323c"; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, UI_Y+0.5); ctx.lineTo(W, UI_Y+0.5); ctx.stroke();

      // tower slots (left side, 6 slots)
      const slotW = 95, slotH = 90, slotGap = 8, startX = 14, startY = UI_Y + 15;
      for (let i = 0; i < TKEYS.length; i++) {
        const key = TKEYS[i];
        const def = TDEFS[key];
        const sx = startX + i * (slotW + slotGap), sy = startY;
        const unlocked = G.unlocked.includes(key);
        const affordable = G.currency >= def.cost;
        const selected = G.selType === key;
        const hovered = mouse.x >= sx && mouse.x <= sx+slotW && mouse.y >= sy && mouse.y <= sy+slotH;

        // slot bg
        ctx.fillStyle = selected ? "#2b4a6b" : hovered && unlocked ? "#242a33" : "#1e2229";
        ctx.fillRect(sx, sy, slotW, slotH);
        ctx.strokeStyle = selected ? "#4ea3ff" : "#2a323c";
        ctx.lineWidth = selected ? 2 : 1;
        ctx.strokeRect(sx+0.5, sy+0.5, slotW-1, slotH-1);

        if (unlocked) {
          // mini cat icon
          ctx.save(); ctx.globalAlpha = affordable ? 1 : 0.4;
          drawCatTower(sx + slotW/2, sy + 30, def.color, 0, 0.55);
          ctx.restore();
          // name
          ctx.fillStyle = affordable ? "#e8eef6" : "#667";
          ctx.font = "11px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "top";
          ctx.fillText(def.name, sx + slotW/2, sy + 52);
          // cost
          ctx.fillStyle = affordable ? "#4ea3ff" : "#994444";
          ctx.font = "bold 12px system-ui";
          ctx.fillText(def.cost + " \uD83D\uDC1F", sx + slotW/2, sy + 68);
          // hotkey
          ctx.fillStyle = "#556"; ctx.font = "10px system-ui"; ctx.textAlign = "right"; ctx.textBaseline = "top";
          ctx.fillText(""+(i+1), sx + slotW - 4, sy + 3);
        } else {
          // locked
          ctx.save(); ctx.globalAlpha = 0.4;
          ctx.fillStyle = "#556"; ctx.font = "bold 20px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText("\uD83D\uDD12", sx + slotW/2, sy + 30);
          ctx.font = "11px system-ui"; ctx.textBaseline = "top";
          ctx.fillText("Wave " + TUNLOCK[key], sx + slotW/2, sy + 52);
          ctx.restore();
        }
      }

      // right side: wave info + button
      const rx = 620, ry = UI_Y + 15;
      ctx.fillStyle = "#e8eef6"; ctx.font = "bold 16px system-ui"; ctx.textAlign = "left"; ctx.textBaseline = "top";
      ctx.fillText("Wave " + G.wave + " / 20", rx + 50, ry + 5);
      ctx.fillStyle = "#aab6c5"; ctx.font = "13px system-ui";
      ctx.fillText("Lives: " + G.lives + "   Fish: " + G.currency, rx + 50, ry + 28);

      // Send Wave button (only during prep)
      if (G.waveState === "prep") {
        const bx = rx + 50, by = ry + 52, bw = 140, bh = 36;
        const bHover = mouse.x >= bx && mouse.x <= bx+bw && mouse.y >= by && mouse.y <= by+bh;
        ctx.fillStyle = bHover ? "#2b8cff" : "#1f6feb";
        ctx.fillRect(bx, by, bw, bh);
        ctx.strokeStyle = "rgba(255,255,255,0.2)"; ctx.strokeRect(bx+0.5,by+0.5,bw-1,bh-1);
        ctx.fillStyle = "#fff"; ctx.font = "bold 14px system-ui"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("Send Wave \u25B6", bx+bw/2, by+bh/2);
        btnSendWave = { x: bx, y: by, w: bw, h: bh };
      } else {
        btnSendWave = null;
      }

      // tower slots for click detection
      towerSlots = [];
      for (let i = 0; i < TKEYS.length; i++) {
        towerSlots.push({ x: startX + i*(slotW+slotGap), y: startY, w: slotW, h: slotH, key: TKEYS[i] });
      }
    }
    let btnSendWave = null;
    let towerSlots = [];

    let towerInfoBtns = {};

    // === OVERLAY SCREENS ===
    function wrapText(text, cx, y, maxW, lh) {
      const words = text.split(/\s+/); let line = "", yy = y;
      ctx.textAlign = "center";
      for (let i = 0; i < words.length; i++) {
        const test = line ? line + " " + words[i] : words[i];
        if (ctx.measureText(test).width > maxW && line) { ctx.fillText(line, cx, yy); line = words[i]; yy += lh; }
        else line = test;
      }
      if (line) ctx.fillText(line, cx, yy);
    }

    function drawOverlay(title, subtitle, btnLabel) {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.6)"; ctx.fillRect(0,0,W,H);
      const pw = 500, ph = 260, px = (W-pw)/2, py = (H-ph)/2;
      ctx.fillStyle = "rgba(19,24,30,0.95)"; ctx.fillRect(px,py,pw,ph);
      ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.strokeRect(px+0.5,py+0.5,pw-1,ph-1);
      ctx.fillStyle = "#e8eef6"; ctx.textAlign = "center"; ctx.textBaseline = "top";
      ctx.font = "bold 26px system-ui"; ctx.fillText(title, W/2, py+28);
      ctx.fillStyle = "#aab6c5"; ctx.font = "15px system-ui";
      wrapText(subtitle, W/2, py+76, pw-60, 22);
      // button
      const bw = 160, bh = 44, bx = (W-bw)/2, by = py+ph-68;
      const hov = mouse.x>=bx&&mouse.x<=bx+bw&&mouse.y>=by&&mouse.y<=by+bh;
      ctx.fillStyle = hov ? "#2b8cff" : "#1f6feb";
      ctx.fillRect(bx,by,bw,bh);
      ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.strokeRect(bx+0.5,by+0.5,bw-1,bh-1);
      ctx.fillStyle = "#fff"; ctx.font = "bold 16px system-ui"; ctx.textBaseline = "middle";
      ctx.fillText(btnLabel, bx+bw/2, by+bh/2);
      ctx.restore();
      overlayBtn = { x:bx, y:by, w:bw, h:bh };
      return hov;
    }
    let overlayBtn = null;
    // CHUNK5_INSERT

    // === INPUT HANDLING ===
    const mouse = { x: -1, y: -1, down: false, clicked: false, rClicked: false };
    const keys = new Set();
    let keyPressed = null;

    canvas.addEventListener("mousemove", (e) => {
      const r = canvas.getBoundingClientRect();
      mouse.x = (e.clientX - r.left) * (W / r.width);
      mouse.y = (e.clientY - r.top) * (H / r.height);
      if (mouse.y < UI_Y) {
        G.hoverCell = { col: Math.floor(mouse.x / GS), row: Math.floor(mouse.y / GS) };
      } else {
        G.hoverCell = null;
      }
    });
    canvas.addEventListener("mouseleave", () => { mouse.x = -1; mouse.y = -1; G.hoverCell = null; });
    canvas.addEventListener("mousedown", () => { mouse.down = true; });
    window.addEventListener("mouseup", () => { if (mouse.down) mouse.clicked = true; mouse.down = false; });
    canvas.addEventListener("contextmenu", (e) => { e.preventDefault(); mouse.rClicked = true; });

    window.addEventListener("keydown", (e) => {
      const k = e.key;
      if (["1","2","3","4","5","6"," ","Escape","Enter"].includes(k)) e.preventDefault();
      keys.add(k);
      keyPressed = k;
    }, { passive: false });
    window.addEventListener("keyup", (e) => { keys.delete(e.key); });

    function handleInput() {
      // keyboard tower select
      if (keyPressed) {
        const num = parseInt(keyPressed);
        if (num >= 1 && num <= 6) {
          const key = TKEYS[num - 1];
          if (G.unlocked.includes(key) && G.currency >= TDEFS[key].cost) {
            G.selType = G.selType === key ? null : key;
            G.selTower = null;
          }
        }
        if (keyPressed === " " || keyPressed === "Enter") {
          if (G.state === "menu") { G.state = "playing"; getAudioCtx(); }
          else if (G.state === "victory" || G.state === "gameover") { resetGame(); G.state = "playing"; getAudioCtx(); }
          else if (G.state === "playing" && G.waveState === "prep") startWave();
        }
        if (keyPressed === "Escape") { G.selType = null; G.selTower = null; }
        keyPressed = null;
      }
      // right click cancel
      if (mouse.rClicked) { G.selType = null; G.selTower = null; mouse.rClicked = false; }

      if (!mouse.clicked) return;
      mouse.clicked = false;

      // overlay button
      if ((G.state === "menu" || G.state === "victory" || G.state === "gameover") && overlayBtn) {
        if (mouse.x >= overlayBtn.x && mouse.x <= overlayBtn.x+overlayBtn.w &&
            mouse.y >= overlayBtn.y && mouse.y <= overlayBtn.y+overlayBtn.h) {
          getAudioCtx();
          if (G.state === "menu") G.state = "playing";
          else { resetGame(); G.state = "playing"; }
          return;
        }
      }
      if (G.state !== "playing") return;

      // send wave button
      if (btnSendWave && G.waveState === "prep") {
        if (mouse.x >= btnSendWave.x && mouse.x <= btnSendWave.x+btnSendWave.w &&
            mouse.y >= btnSendWave.y && mouse.y <= btnSendWave.y+btnSendWave.h) {
          startWave(); return;
        }
      }

      // tower info buttons
      if (G.selTower && towerInfoBtns) {
        if (towerInfoBtns.upgrade) {
          const b = towerInfoBtns.upgrade;
          if (mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h) {
            if (upgradeTower(G.selTower)) soundUpgrade();
            return;
          }
        }
        if (towerInfoBtns.sell) {
          const b = towerInfoBtns.sell;
          if (mouse.x>=b.x&&mouse.x<=b.x+b.w&&mouse.y>=b.y&&mouse.y<=b.y+b.h) {
            sellTower(G.selTower); soundSell(); return;
          }
        }
      }

      // tower slot clicks (bottom panel)
      for (const slot of towerSlots) {
        if (mouse.x >= slot.x && mouse.x <= slot.x+slot.w && mouse.y >= slot.y && mouse.y <= slot.y+slot.h) {
          if (G.unlocked.includes(slot.key)) {
            G.selType = G.selType === slot.key ? null : slot.key;
            G.selTower = null;
          }
          return;
        }
      }

      // placement on grid
      if (G.selType && G.hoverCell) {
        const {col, row} = G.hoverCell;
        if (placeTower(G.selType, col, row)) {
          soundPlace();
          if (G.currency < TDEFS[G.selType].cost) G.selType = null;
        }
        return;
      }

      // click on placed tower to select it
      if (mouse.y < UI_Y) {
        let found = null;
        for (const t of G.towers) {
          if (Math.abs(mouse.x - t.x) < GS/2 && Math.abs(mouse.y - t.y) < GS/2) { found = t; break; }
        }
        if (found) { G.selTower = G.selTower && G.selTower.id === found.id ? null : found; G.selType = null; }
        else { G.selTower = null; }
      }
    }

    // === MAIN GAME LOOP ===
    let lastTime = 0;

    function tick(timestamp) {
      const dt = lastTime ? Math.min((timestamp - lastTime) / (1000 / 60), 3) : 1;
      lastTime = timestamp;

      // UPDATE
      handleInput();
      if (G.state === "playing") {
        if (G.waveState === "active") {
          updateSpawner(dt);
          updateEnemies(dt);
          updateTowers(dt);
          updateProjectiles(dt);
          updateParticles(dt);
          checkWaveComplete();
        } else if (G.waveState === "intermission") {
          G.interTimer -= dt;
          updateParticles(dt);
          if (G.interTimer <= 0) {
            G.waveState = "prep";
            G.wave++;
            if (G.wave > 20) { G.state = "victory"; soundVictory(); }
          }
        } else {
          updateParticles(dt);
        }
      }

      // DRAW
      drawMap();
      drawTowers();
      drawEnemies();
      drawProjectiles();
      drawParticles();
      if (G.selType) drawPlacementPreview();
      if (G.state === "playing") {
        drawHUD();
        drawUIPanel();
        drawTowerInfo();
        drawUnlockNote();
      }

      // OVERLAYS
      if (G.state === "menu") {
        drawOverlay("Cat Tower Defense",
          "Place cat towers to defend against waves of critters! Click a tower in the panel below, then click on grass to place it. Upgrade and sell towers by clicking them. Survive all 20 waves to win!",
          "Play");
      } else if (G.state === "victory") {
        drawOverlay("Victory!",
          "You defended the territory through all 20 waves! Total kills: " + G.totalKills + ". Lives remaining: " + G.lives + ". Towers built: " + G.towers.length + ".",
          "Play Again");
      } else if (G.state === "gameover") {
        drawOverlay("Game Over",
          "The critters broke through! You survived " + (G.wave) + " waves with " + G.totalKills + " total kills.",
          "Try Again");
      }

      requestAnimationFrame(tick);
    }

    requestAnimationFrame(tick);

  })();
  </script>
</body>
</html>
